version: '3.8'

services:
  # 1. The PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: fairac_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-fairac_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      # Exposes Postgres to localhost only for debugging
      # It is NOT exposed to the public internet
      - "127.0.0.1:5432:5432"
    volumes:
      # This ensures database data survives if the container restarts
      - fairac_pgdata:/var/lib/postgresql/data
    networks:
      - fairac_network

  # 2. The Node.js Backend Container
  api:
    build: .
    container_name: fairac_api
    restart: always
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Docker Compose automatically maps "db" to the container above
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fairac_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-10}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      # Maps port 5000 inside the container to port 5000 on the server
      - "5000:5000"
    networks:
      - fairac_network

# Define the persistent volume for the database
volumes:
  fairac_pgdata:

# Define a custom private network for the containers to talk to each other securely
networks:
  fairac_network:
    driver: bridge
