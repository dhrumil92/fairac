version: '3.8'

services:
  # 1. The PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: fairac_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-fairac_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fairac_pgdata:/var/lib/postgresql/data
    networks:
      - fairac_network

  # 2. The Node.js Backend API Container
  api:
    build: ./backend
    container_name: fairac_api
    restart: always
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fairac_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-10}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "5000:5000"
    networks:
      - fairac_network

  # 3. The React Admin Web Panel Container
  web:
    build: ./frontend
    container_name: fairac_web
    restart: always
    depends_on:
      - api
    ports:
      # Exposes Nginx (Port 80) to the public internet
      - "80:80"
    networks:
      - fairac_network

volumes:
  fairac_pgdata:

networks:
  fairac_network:
    driver: bridge
