server {
    listen 80;
    
    # Serve static files from the build directory
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This is critical for React Router (Single Page Applications)
        # If Nginx doesn't find a file matching the URL, it returns index.html
        # instead of a 404 Error, allowing React Router to handle the route.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Log errors if necessary
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
